<div class="agents-page">
  <h1>Agents</h1>

  @if (error) {
    <p class="error">{{ error }}</p>
  } @else if (agents.length === 0) {
    <p class="empty">No agents found.</p>
  } @else {
    <div class="agents-grid">
      @for (agent of agents; track agent.id) {
        <div class="agent-card">
          <h2>{{ agent.name }}</h2>
          <p>{{ agent.description }}</p>
        </div>
      }
    </div>
  }
</div>
