{{- if .Values.externalDatabase.url }}
# Escape hatch for dev/testing only. In production leave externalDatabase.url
# empty and reference an existing Secret via externalDatabase.existingSecret
# (provisioned by External Secrets Operator / Azure Key Vault).
apiVersion: v1
kind: Secret
metadata:
  name: cerrado-db
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "cerrado.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.externalDatabase.secretKey }}: {{ .Values.externalDatabase.url | quote }}
{{- end }}
