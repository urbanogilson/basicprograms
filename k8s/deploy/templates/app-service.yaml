apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    {{- include "agents.app.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "agents.app.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: {{ .Values.app.port }}
      protocol: TCP
