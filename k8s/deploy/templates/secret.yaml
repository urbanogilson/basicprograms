{{- if .Values.database.url }}
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.database.url | quote }}
{{- else }}
# WARNING: database.url is not set.
# Pass it at deploy time:
#   helm upgrade --install agents ./deploy --set database.url="postgresql://..."
# Never commit real credentials to values files.
{{- end }}
