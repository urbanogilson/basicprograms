# WARNING: Do NOT commit real credentials to source control.
# Populate DATABASE_URL before applying, or use External Secrets Operator
# with Azure Key Vault instead of managing this file manually.
#
# Recommended for AKS:
#   az aks update --attach-acr <acr-name> --resource-group <rg> --name <cluster>
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: agents
type: Opaque
stringData:
  DATABASE_URL: "postgresql://<user>:<password>@<host>.postgres.database.azure.com:5432/agentsdb?sslmode=require"
