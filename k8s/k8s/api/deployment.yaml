apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: agents
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api
    spec:
      # For AKS + ACR: attach ACR to cluster via:
      #   az aks update --attach-acr <acr-name> --resource-group <rg> --name <cluster>
      # Or uncomment imagePullSecrets below if using a registry secret instead:
      # imagePullSecrets:
      #   - name: acr-secret
      containers:
        - name: api
          image: <acr-name>.azurecr.io/agents-api:<tag>
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3333
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3333"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: DATABASE_URL
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3333
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3333
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
