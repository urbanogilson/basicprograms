services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentsdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: agents-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agentsdb
      PORT: 3333
    ports:
      - "3333:3333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3333/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
    image: agents-app
    ports:
      - "4200:8080"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
